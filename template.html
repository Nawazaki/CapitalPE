<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{TITLE}} | ForexMax Market Intelligence</title>
    <meta name="description" content="{{DESCRIPTION}}">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        obsidian: '#050507',
                        slate: '#12141a',
                        surface: '#1c1f26',
                        accent: { gold: '#D4AF37', goldLight: '#F3E5AB', cyan: '#00E5FF' }
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #050507; color: #f8fafc; overflow-x: hidden; }
        .bg-grid {
            background-size: 40px 40px;
            background-image: linear-gradient(to right, rgba(255, 255, 255, 0.02) 1px, transparent 1px),
                              linear-gradient(to bottom, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
        }
        .premium-border { border: 1px solid rgba(255, 255, 255, 0.06); box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5); }
    </style>
    {{SEO_TAGS}}
</head>
<body class="antialiased bg-grid relative selection:bg-accent-gold selection:text-obsidian">
    <nav class="fixed w-full z-50 top-0 bg-obsidian/80 backdrop-blur-md border-b border-white/5">
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
            <a href="/" class="text-2xl font-bold tracking-tighter text-white flex items-center gap-2">
                <div class="w-3 h-3 bg-accent-gold rounded-sm"></div>
                ForexMax<span class="text-accent-gold">.</span>
            </a>
            <a href="mailto:djamal@forexmax.com" class="px-5 py-2 text-sm font-medium text-white border border-white/10 rounded-full hover:border-accent-gold">Inquire Acquisition</a>
        </div>
    </nav>

    <main class="pt-32 pb-24 max-w-4xl mx-auto px-6">
        <article class="bg-surface premium-border rounded-2xl p-8 md:p-12">
            <time datetime="{{DATETIME}}" class="text-accent-gold text-sm font-bold uppercase tracking-widest mb-4 block">{{DATE_DISPLAY}}</time>
            <h1 class="text-4xl md:text-5xl font-extrabold mb-8 text-white leading-tight">{{TITLE}}</h1>
            <div class="prose prose-invert max-w-none text-gray-300 leading-relaxed space-y-6">
                {{CONTENT}}
            </div>
        </article>
        
        <div class="mt-12 text-center">
            <a href="/" class="text-accent-cyan hover:text-white transition-colors flex items-center justify-center gap-2">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
                Back to Market Intelligence Hub
            </a>
        </div>
    </main>

    <footer class="border-t border-white/5 bg-obsidian py-12">
        <div class="max-w-7xl mx-auto px-6 flex flex-col md:flex-row items-center justify-between gap-6 text-gray-500 text-sm">
            <div class="text-white font-bold text-xl">ForexMax<span class="text-accent-gold">.</span></div>
            <div>&copy; 2026 ForexMax. All rights reserved. | Premium Digital Asset Portfolio.</div>
            <div class="flex gap-6">
                <a href="mailto:djamal@forexmax.com" class="hover:text-white">Contact</a>
            </div>
        </div>
    </footer>
</body>
</html>
